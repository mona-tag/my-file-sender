name: Build Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-20.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ccache git libffi-dev libssl-dev xclip python3-setuptools
          # 安装最低限度的独立依赖，绝不依赖可能冲突的库
          pip install --upgrade pip
          pip install cython==0.29.33 buildozer aidu

      - name: Build APK with Buildozer
        run: |
          # 自动同意 SDK 协议并开始编译
          yes | buildozer android debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FileSender-Android-APK
          path: bin/*.apk
